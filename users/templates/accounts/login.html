{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
	<div class="row justify-content-center">
		<div class="col-md-8">
			<div class="card shadow-lg p-4">
				<h3 class="text-center mb-4">Login</h3>
				<form method="post" >
					{% csrf_token %} {% for field in form %}
					<div class="row mb-3 align-items-center">
						<label class="col-sm-2 col-form-label font-weight-bold">{{field.label}}</label>
						<div class="col-sm-10">
							{{field}} {% if field.errors%}
						<p class="text-danger" >{{field.errors|striptags}}</p>
						{%endif%}
						</div>
					</div>
					{%endfor%}
					<input type="hidden" name="next" value="{% url 'home_page' %}">
					<button type="submit" class="btn btn-primary">Login</button>
				</form>
				<a href="{% url 'register' %}" class="py-4"> Don't have an account? </a>
			</div>
		</div>
	</div>
</div>
{% endblock %}
